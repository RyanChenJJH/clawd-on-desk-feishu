<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!-- clawd health reminder: sit up straight. Slouches, then straightens the
       back with a small overshoot and settles; an up-chevron hint rises. ~4s loop. -->
  <title>clawd health posture</title>
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
  <g id="master">
    <g id="body" fill="#DE886D">
      <rect x="2" y="6" width="11" height="7">
        <animate attributeName="y" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.25;0.55;0.7;1" values="6;7.2;5.7;6;6"/>
        <animate attributeName="height" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.25;0.55;0.7;1" values="7;5.8;7.3;7;7"/>
      </rect>
      <rect x="0" y="9" width="2" height="2">
        <animate attributeName="y" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.25;0.55;0.7;1" values="9;10;8.7;9;9"/>
      </rect>
      <rect x="13" y="9" width="2" height="2">
        <animate attributeName="y" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.25;0.55;0.7;1" values="9;10;8.7;9;9"/>
      </rect>
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
    </g>
    <g id="eyes" fill="#000000">
      <rect x="4" y="8" width="1" height="2">
        <animate attributeName="y" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.25;0.55;0.7;1" values="8;9.2;7.6;8;8"/>
      </rect>
      <rect x="10" y="8" width="1" height="2">
        <animate attributeName="y" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.25;0.55;0.7;1" values="8;9.2;7.6;8;8"/>
      </rect>
    </g>
    <g stroke="#D97757" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0">
      <animate attributeName="opacity" dur="4s" repeatCount="indefinite" keyTimes="0;0.35;0.55;0.75;1" values="0;0.9;0.9;0;0"/>
      <animateTransform attributeName="transform" type="translate" dur="4s" repeatCount="indefinite"
        keyTimes="0;0.35;0.75;1" values="0 1;0 0;0 -1.5;0 -1.5"/>
      <polyline points="6,2.2 7.5,0.8 9,2.2"/>
    </g>
  </g>
</svg>

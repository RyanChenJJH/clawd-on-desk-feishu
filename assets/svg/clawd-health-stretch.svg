<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!-- clawd health reminder: stand & stretch. Body extends upward, both claws
       reach up, eyes squeeze, then settles with a small bounce. ~4.5s loop. -->
  <title>clawd health stretch</title>
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5">
    <animate attributeName="width" dur="4.5s" repeatCount="indefinite"
      keyTimes="0;0.3;0.6;0.78;1" values="9;7.6;7.6;9.6;9"/>
    <animate attributeName="x" dur="4.5s" repeatCount="indefinite"
      keyTimes="0;0.3;0.6;0.78;1" values="3;3.7;3.7;2.7;3"/>
  </rect>
  <g id="master">
    <g id="body" fill="#DE886D">
      <rect x="2" y="6" width="11" height="7">
        <animate attributeName="y" dur="4.5s" repeatCount="indefinite"
          keyTimes="0;0.3;0.6;0.78;1" values="6;4.4;4.4;6.4;6"/>
        <animate attributeName="height" dur="4.5s" repeatCount="indefinite"
          keyTimes="0;0.3;0.6;0.78;1" values="7;8.6;8.6;6.6;7"/>
      </rect>
      <rect id="left-arm" x="0" y="9" width="2" height="2">
        <animateTransform attributeName="transform" type="translate" dur="4.5s" repeatCount="indefinite"
          keyTimes="0;0.3;0.6;0.8;1" values="0 0;-0.4 -7.5;-0.4 -7.5;0 0;0 0"/>
      </rect>
      <rect id="right-arm" x="13" y="9" width="2" height="2">
        <animateTransform attributeName="transform" type="translate" dur="4.5s" repeatCount="indefinite"
          keyTimes="0;0.3;0.6;0.8;1" values="0 0;0.4 -7.5;0.4 -7.5;0 0;0 0"/>
      </rect>
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
    </g>
    <g id="eyes" fill="#000000">
      <rect x="4" y="8" width="1" height="2">
        <animate attributeName="y" dur="4.5s" repeatCount="indefinite"
          keyTimes="0;0.3;0.6;0.78;1" values="8;6.6;6.6;8.2;8"/>
        <animate attributeName="height" dur="4.5s" repeatCount="indefinite"
          keyTimes="0;0.28;0.4;0.6;0.78;1" values="2;2;0.6;0.6;2;2"/>
      </rect>
      <rect x="10" y="8" width="1" height="2">
        <animate attributeName="y" dur="4.5s" repeatCount="indefinite"
          keyTimes="0;0.3;0.6;0.78;1" values="8;6.6;6.6;8.2;8"/>
        <animate attributeName="height" dur="4.5s" repeatCount="indefinite"
          keyTimes="0;0.28;0.4;0.6;0.78;1" values="2;2;0.6;0.6;2;2"/>
      </rect>
    </g>
    <g stroke="#D97757" stroke-width="0.4" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" dur="4.5s" repeatCount="indefinite"
        keyTimes="0;0.32;0.45;0.6;1" values="0;0.9;0.9;0;0"/>
      <line x1="0.5" y1="0" x2="-0.6" y2="-1"/>
      <line x1="14.5" y1="0" x2="15.6" y2="-1"/>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!-- clawd health reminder: deep breathing. Slow chest expand/contract,
       eyes soften, a calm breath ring drifts up and fades. ~5s loop. -->
  <title>clawd health breathe</title>
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
  <g id="master">
    <g id="body" fill="#DE886D">
      <rect x="2" y="6" width="11" height="7">
        <animate attributeName="y" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;0.7;1" values="6;5.3;6;6"/>
        <animate attributeName="height" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;0.7;1" values="7;7.7;7;7"/>
      </rect>
      <rect x="0" y="9" width="2" height="2">
        <animate attributeName="y" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;0.7;1" values="9;8.4;9;9"/>
      </rect>
      <rect x="13" y="9" width="2" height="2">
        <animate attributeName="y" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;0.7;1" values="9;8.4;9;9"/>
      </rect>
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
    </g>
    <g id="eyes" fill="#000000">
      <rect x="4" y="8" width="1" height="2">
        <animate attributeName="y" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;0.7;1" values="8;7.4;8;8"/>
        <animate attributeName="height" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;0.7;1" values="2;1.2;2;2"/>
      </rect>
      <rect x="10" y="8" width="1" height="2">
        <animate attributeName="y" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;0.7;1" values="8;7.4;8;8"/>
        <animate attributeName="height" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;0.7;1" values="2;1.2;2;2"/>
      </rect>
    </g>
    <circle cx="7.5" cy="2" r="0.6" fill="none" stroke="#7FB8D6" stroke-width="0.3" opacity="0">
      <animate attributeName="opacity" dur="5s" repeatCount="indefinite" keyTimes="0;0.4;0.72;0.9;1" values="0;0.25;0.55;0;0"/>
      <animate attributeName="r" dur="5s" repeatCount="indefinite" keyTimes="0;0.4;0.9;1" values="0.6;1.2;2.6;2.6"/>
      <animate attributeName="cy" dur="5s" repeatCount="indefinite" keyTimes="0;0.4;0.9;1" values="3;2;-1;-1"/>
    </circle>
  </g>
</svg>

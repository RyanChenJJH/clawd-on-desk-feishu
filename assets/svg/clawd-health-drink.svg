<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!-- clawd health reminder: drink water. Reuses the canonical clawd body
       (torso #DE886D, eyes #000) and raises a water glass to sip. ~4s loop. -->
  <title>clawd health drink</title>
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
  <g id="master">
    <g id="body" fill="#DE886D">
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
      <rect id="right-arm" x="13" y="9" width="2" height="2">
        <animateTransform attributeName="transform" type="translate" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.22;0.58;0.82;1" values="0 0;-6.5 -4;-6.5 -4;0 0;0 0"/>
      </rect>
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
    </g>
    <g id="eyes" fill="#000000">
      <rect x="4" y="8" width="1" height="2">
        <animate attributeName="height" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.42;0.5;0.58;1" values="2;2;0.5;2;2"/>
      </rect>
      <rect x="10" y="8" width="1" height="2">
        <animate attributeName="height" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.42;0.5;0.58;1" values="2;2;0.5;2;2"/>
      </rect>
    </g>
    <g id="glass">
      <animateTransform attributeName="transform" type="translate" dur="4s" repeatCount="indefinite"
        keyTimes="0;0.22;0.58;0.82;1" values="0 0;-7 -4.2;-7 -4.2;0 0;0 0"/>
      <rect x="12.4" y="7.4" width="3.2" height="4.6" rx="0.4" fill="#BFE3F2" stroke="#7FB8D6" stroke-width="0.3"/>
      <rect id="water" x="12.7" y="9.2" width="2.6" height="2.6" fill="#5AB4E0">
        <animate attributeName="y" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.3;0.5;0.72;1" values="9.2;9.2;10.8;9.2;9.2"/>
        <animate attributeName="height" dur="4s" repeatCount="indefinite"
          keyTimes="0;0.3;0.5;0.72;1" values="2.6;2.6;1;2.6;2.6"/>
      </rect>
    </g>
    <circle cx="7.5" cy="1.4" r="0.5" fill="#5AB4E0" opacity="0">
      <animate attributeName="opacity" dur="4s" repeatCount="indefinite" keyTimes="0;0.82;0.9;1" values="0;0;0.9;0"/>
      <animate attributeName="cy" dur="4s" repeatCount="indefinite" keyTimes="0;0.82;1" values="1.4;1.4;3.2"/>
    </circle>
  </g>
</svg>

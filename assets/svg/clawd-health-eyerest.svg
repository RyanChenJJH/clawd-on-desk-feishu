<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!-- clawd health reminder: eye rest / look away. clawd closes its eyes and
       breathes, then opens and slowly gazes left and right (20-20-20 rule).
       Deliberately slow. ~5s loop. -->
  <title>clawd health eyerest</title>
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
  <g id="master">
    <g id="body" fill="#DE886D">
      <rect x="2" y="6" width="11" height="7">
        <!-- gentle breathing -->
        <animate attributeName="y" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.25;0.5;0.75;1" values="6;6.5;6;6.5;6"/>
        <animate attributeName="height" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.25;0.5;0.75;1" values="7;6.5;7;6.5;7"/>
      </rect>
      <rect x="0" y="9" width="2" height="2"/>
      <rect x="13" y="9" width="2" height="2"/>
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
    </g>
    <g id="eyes" fill="#000000">
      <rect x="4" y="8" width="1" height="2">
        <!-- closed at the start (rest), then open and gaze L/R -->
        <animate attributeName="height" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.28;0.34;1" values="0.4;0.4;2;2"/>
        <animate attributeName="y" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.28;0.34;1" values="9;9;8;8"/>
        <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;0.55;0.72;0.88;1" values="0 0;0 0;-0.8 0;0.8 0;0 0;0 0"/>
      </rect>
      <rect x="10" y="8" width="1" height="2">
        <animate attributeName="height" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.28;0.34;1" values="0.4;0.4;2;2"/>
        <animate attributeName="y" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.28;0.34;1" values="9;9;8;8"/>
        <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;0.55;0.72;0.88;1" values="0 0;0 0;-0.8 0;0.8 0;0 0;0 0"/>
      </rect>
    </g>
    <!-- distant gaze target that drifts L/R -->
    <circle cx="7.5" cy="-1.5" r="0.45" fill="#D97757" opacity="0">
      <animate attributeName="opacity" dur="5s" repeatCount="indefinite"
        keyTimes="0;0.4;0.5;0.85;0.95;1" values="0;0;0.8;0.8;0;0"/>
      <animate attributeName="cx" dur="5s" repeatCount="indefinite"
        keyTimes="0;0.5;0.72;0.88;1" values="3;3;12;7.5;7.5"/>
    </circle>
  </g>
</svg>

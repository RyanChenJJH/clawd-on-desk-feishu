<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!-- clawd health reminder: bedtime. Eyes grow heavy and the body droops while
       two sleepy "Z" marks drift up and fade. ~5s loop. -->
  <title>clawd health sleeptime</title>
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
  <g id="master">
    <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
      keyTimes="0;0.4;0.7;1" values="0 0;0 0.7;0 0.9;0 0"/>
    <g id="body" fill="#DE886D">
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
      <rect x="13" y="9" width="2" height="2"/>
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
    </g>
    <g id="eyes" fill="#000000">
      <rect x="4" y="8" width="1" height="2">
        <animate attributeName="height" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.3;0.6;0.85;1" values="2;0.8;0.5;0.5;2"/>
        <animate attributeName="y" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.3;0.6;0.85;1" values="8;9.2;9.5;9.5;8"/>
      </rect>
      <rect x="10" y="8" width="1" height="2">
        <animate attributeName="height" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.3;0.6;0.85;1" values="2;0.8;0.5;0.5;2"/>
        <animate attributeName="y" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.3;0.6;0.85;1" values="8;9.2;9.5;9.5;8"/>
      </rect>
    </g>
    <g stroke="#7A6CC4" stroke-width="0.45" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g opacity="0">
        <animate attributeName="opacity" dur="5s" repeatCount="indefinite" keyTimes="0;0.15;0.45;0.6;1" values="0;0.9;0.9;0;0"/>
        <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.6;1" values="0 0;3 -6;3 -6"/>
        <polyline points="11.5,2 13,2 11.5,3.6 13,3.6"/>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" dur="5s" repeatCount="indefinite" keyTimes="0;0.4;0.7;0.88;1" values="0;0;0.9;0;0"/>
        <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
          keyTimes="0;0.4;1" values="0 0;2.4 -5;2.4 -5"/>
        <polyline points="12.5,0 13.7,0 12.5,1.3 13.7,1.3"/>
      </g>
    </g>
  </g>
</svg>
